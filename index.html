<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Régie – ON-AIR</title>

  <style>
    :root{
      --brand:#183156;
      --bg:#0b1625;
      --ring: rgba(255,255,255,.12);
      --text:#eaf0fb;
      --muted:#9fb2d4;

      --white:#ffffff;
      --red:#ff2d2d;
      --blue:#64a9ff;
      --neonGlow: rgba(255,45,45,.55);
      --brandGlow: rgba(24,49,86,.35);

      --shadow: 0 22px 52px rgba(0,0,0,.55);
      --radius: 18px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{box-sizing:border-box}
    html, body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 0%, rgba(24,49,86,.18), transparent 58%),
        radial-gradient(900px 560px at 90% 10%, rgba(59,130,246,.08), transparent 56%),
        linear-gradient(180deg, #0b1625, #0e1b2c);
      overflow:hidden;
      position:relative;
    }

    body.onair{
      box-shadow: inset 0 0 0 12px rgba(255,45,45,.95), inset 0 0 80px rgba(255,45,45,.30), inset 0 0 160px rgba(255,45,45,.18);
    }

    body::before{
      content:"";
      position:fixed; inset:-12vh -12vw;
      background:
        radial-gradient(900px 520px at 12% 12%, rgba(24,49,86,.22), transparent 62%),
        radial-gradient(900px 520px at 88% 8%, rgba(96,165,250,.12), transparent 64%);
      filter: blur(6px);
      opacity:.75;
      pointer-events:none;
      z-index:0;
    }

    .stage{
      position:relative;
      height:100vh;
      width:100vw;
      overflow:hidden;
    }

    .page{
      position:absolute;
      top:0;
      left:50%;
      width: 1920px;
      margin:0;
      padding: 18px 32px;
      display:flex;
      flex-direction:column;
      gap: 16px;
      z-index:1;

      transform: translateX(-50%) scale(var(--scale, 1));
      transform-origin: center top;
      will-change: transform;
      transition: transform 700ms ease;
    }

    .onairBar{
      border-radius: 20px;
      border: 2px solid rgba(24,49,86,.30);
      box-shadow: 0 12px 36px rgba(0,0,0,.45);
      padding: 12px 22px;
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-user-select:none;
      user-select:none;
      position:relative;

      background: linear-gradient(180deg, #ffffff, #f2f5f9);
      color: rgba(0,0,0,.88);
      letter-spacing: 10px;
      font-weight: 950;
      font-size: clamp(42px, 5vw, 72px);
      text-transform: uppercase;
      text-shadow: 0 3px 0 rgba(0,0,0,.10);
    }

    .onairBar::after{
      content:"";
      position:absolute; inset:0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      opacity:.10;
      pointer-events:none;
    }

    .onairLeft{
      position:absolute;
      left: 24px;
      display:flex;
      align-items:center;
      gap: 14px;
      z-index:1;
    }
    .onairRight{
      position:absolute;
      right: 24px;
      display:flex;
      align-items:center;
      gap: 14px;
      z-index:1;
    }

    .topLogoWrap{
      height: 60px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(24,49,86,.95);
      border: 1px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      box-shadow: 0 10px 18px rgba(0,0,0,.24);
    }

    .topLogo{
      height: 40px;
      width:auto;
      display:block;
    }

    .onDot{
      display:none;
      width: 16px; height: 16px;
      border-radius: 4px;
      background: #ffffff;
      box-shadow: 0 0 0 2px rgba(24,49,86,.35), 0 8px 14px rgba(0,0,0,.20);
    }

    .onairTitle{
      position:relative;
      z-index:1;
    }

    body.onair .onairBar{
      background: linear-gradient(180deg, var(--red), #b10000);
      color: rgba(255,255,255,.98);
      border-color: rgba(255,45,45,.45);
      text-shadow: 0 2px 0 rgba(0,0,0,.35);
      animation: glowPulse 1.8s ease-in-out infinite;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    body.onair .onDot{
      background:#ff2d2d;
      box-shadow: 0 0 0 2px rgba(255,45,45,.45), 0 0 12px rgba(255,45,45,.55);
    }

    body.onair .topLogoWrap{
      background: rgba(0,0,0,.28);
      border-color: rgba(255,255,255,.16);
    }

    @keyframes glowPulse{
      0%,100%{ filter: brightness(1.00); }
      50%{ filter: brightness(1.06); }
    }

    @keyframes neonBreath{
      0%,100%{ transform: translateZ(0) scale(1); }
      50%{ transform: translateZ(0) scale(1.01); }
    }

    .midRow{
      display:flex;
      align-items:center;
      justify-content:center;

      padding: 12px 20px;
      border-radius: var(--radius);
      border: 1px solid rgba(24,49,86,.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(24,49,86,.20), rgba(24,49,86,.06));
      box-shadow: var(--shadow);
    }

    body.onair .midRow{
      border-color: rgba(255,45,45,.30);
      box-shadow: var(--shadow), 0 0 24px rgba(255,45,45,.22);
    }

    .left, .right{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .right{ justify-self:end; }

    .logo{
      width: 64px;
      height: 64px;
      object-fit:contain;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 10px;
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.35));
      transition: filter .25s ease, border-color .25s ease;
    }

    body.onair .logo{
      border-color: rgba(255,45,45,.30);
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.35)) drop-shadow(0 0 16px rgba(255,45,45,.24));
    }

    .brandText{
      font-weight: 950;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-size: 12px;
      color: rgba(24,49,86,.65);
    }

    .showBox{
      grid-column: 2;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      text-align:center;
    }

    .showLabel{
      font-size: 15px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .titleRow{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .showName{
      font-weight: 950;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: clamp(28px, 3.2vw, 48px);
      color: rgba(238,243,255,.95);
      text-shadow: 0 2px 0 rgba(0,0,0,.18);
    }

    .locationPill{
      font-size: 12px;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(218,228,245,.92);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(24,49,86,.32);
      background: linear-gradient(180deg, rgba(24,49,86,.20), rgba(24,49,86,.08));
    }
    .primaryPanel{
      flex: 1;
      border-radius: var(--radius);
      border: 1px solid rgba(24,49,86,.28);
      background:
        linear-gradient(180deg, rgba(24,49,86,.20), rgba(24,49,86,.08));
      box-shadow: var(--shadow);
      padding: 14px 22px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .primaryTime{
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-weight: 950;
      letter-spacing: 4px;
      font-size: clamp(64px, 7.5vw, 108px);
      color: rgba(218,228,245,.98);
      text-shadow: 0 4px 0 rgba(0,0,0,.22), 0 0 60px rgba(255,255,255,.06);
    }

    .primaryMeta{
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 700;
      color: rgba(163,183,210,.95);
      letter-spacing: 1px;
    }

    /* Horloges */
    .clocks{
      border-radius: var(--radius);
      border: 1px solid rgba(24,49,86,.28);
      background:
        radial-gradient(1000px 260px at 50% 0%, rgba(255,255,255,.06), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(24,49,86,.16), rgba(24,49,86,.08)),
        #0a0f1b;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    body.onair .clocks{
      border-color: rgba(255,45,45,.28);
      box-shadow: var(--shadow), 0 0 22px rgba(255,45,45,.18);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 28px;
    }

    .clockCard{
      position:relative;
      border-radius: 20px;
      border: 1px solid rgba(24,49,86,.32);
      background:
        linear-gradient(180deg, rgba(24,49,86,.20), rgba(24,49,86,.08));
      padding: 14px 16px 12px;
      overflow:hidden;
      width: 100%;
    }

    .clockCard::before{
      content:"";
      position:absolute; inset:-45% -30%;
      background: radial-gradient(circle at 35% 30%, rgba(96,165,250,.12), transparent 58%);
      opacity:.65;
      pointer-events:none;
    }

    .city{
      position:relative;
      font-weight: 950;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      font-size: clamp(20px, 2.2vw, 28px);
      color: rgba(218,228,245,.92);
      margin-bottom: 8px;
      text-align:center;
      text-shadow: 0 2px 0 rgba(0,0,0,.20);
    }

    .time{
      position:relative;
      font-family: var(--mono);
      font-weight: 950;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      font-size: clamp(38px, 3.2vw, 54px);
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(24,49,86,.36);
      background:
        radial-gradient(900px 120px at 50% 0%, rgba(255,255,255,.06), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(24,49,86,.16), rgba(24,49,86,.08));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 18px 34px rgba(0,0,0,.40);
      text-shadow: 0 0 18px rgba(255,255,255,.12);
      text-align:center;
    }

    body.onair .time{
      border-color: rgba(255,45,45,.28);
      text-shadow:
        0 0 10px rgba(255,45,45,.35),
        0 0 24px rgba(255,45,45,.25),
        0 0 2px rgba(255,255,255,.25);
    }

    .meta{
      position:relative;
      margin-top: 12px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      font-family: var(--mono);
      font-size: 14px;
      color: rgba(163,183,210,.95);
    }

    /* Footer */
    .footer{
      margin-top:auto;
      border-radius: var(--radius);
      border: 1px solid var(--ring);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      padding: 12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .fullTime{
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: rgba(218,228,245,.96);
    }

    .api{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      color: var(--muted);
      white-space:nowrap;
    }

    .lamp{
      width:9px; height:9px; border-radius:50%;
      background: rgba(255,255,255,.25);
      box-shadow: 0 0 0 1px rgba(255,255,255,.10), 0 0 16px rgba(255,255,255,.10);
    }
    .lamp.ok{background:#22c55e; box-shadow: 0 0 0 1px rgba(34,197,94,.35), 0 0 16px rgba(34,197,94,.35)}
    .lamp.bad{background:#ef4444; box-shadow: 0 0 0 1px rgba(239,68,68,.35), 0 0 16px rgba(239,68,68,.35)}

    @media (max-width: 1280px){
      .left, .right{ min-width: 220px; }
    }
    @media (max-width: 680px){
      .grid{ grid-template-columns: 1fr; }
      body.onair{ box-shadow: inset 0 0 0 7px rgba(255,45,45,.95); }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="page" id="page">
    <div class="onairBar" id="onairBar">
      <div class="onairLeft">
        <span class="onDot"></span>
        <span class="topLogoWrap">
          <img class="topLogo" src="logo-bsrq.png" alt="Logo BSRQ" onerror="this.style.display='none'">
        </span>
      </div>
      <div class="onairRight">
        <span class="topLogoWrap">
          <img class="topLogo" src="logo-bsrq.png" alt="Logo BSRQ" onerror="this.style.display='none'">
        </span>
      </div>
      <span class="onairTitle">ON-AIR</span>
    </div>

    <div class="midRow">
      <div class="showBox">
        <div class="showLabel">Émission</div>
        <div class="titleRow">
          <div class="showName" id="showName">ESA - CREW12</div>
        </div>
      </div>
    </div>

    <section class="primaryPanel">
      <div class="primaryTime" id="primaryTime">--:--:--</div>
      <div class="primaryMeta" id="primaryMeta">Europe/Paris</div>
    </section>

    <section class="clocks">
      <div class="grid" id="clockGrid"></div>
    </section>

    <div class="footer">
      <div class="fullTime" id="fullTime">Heure complète (Paris) : …</div>
      <div class="api" title="Micro-API locale">
        <span class="lamp" id="apiLamp"></span>
        <span id="apiText">API: …</span>
      </div>
    </div>
    </div>
  </div>

  <script>
    const DEFAULT_SECONDARY_CLOCKS = Object.freeze([
      Object.freeze({ label: "Kourou", timeZone: "America/Cayenne" }),
      Object.freeze({ label: "Cape Canaveral (ET)", timeZone: "America/New_York" }),
      Object.freeze({ label: "UTC", timeZone: "UTC" }),
      Object.freeze({ label: "Paris", timeZone: "Europe/Paris" }),
    ]);

    const DEFAULT_CONFIG = Object.freeze({
      showTitle: "ESA - CREW12",
      primaryTimeZone: "Europe/Paris",
      primaryTimeZoneLabel: "Europe/Paris",
      secondaryClocks: DEFAULT_SECONDARY_CLOCKS,
    });

    const $ = (id) => document.getElementById(id);
    const page          = $("page");
    const apiLamp       = $("apiLamp");
    const apiText       = $("apiText");
    const fullTimeEl    = $("fullTime");
    const primaryTimeEl = $("primaryTime");
    const primaryMetaEl = $("primaryMeta");
    const showNameEl    = $("showName");
    const clockGridEl   = $("clockGrid");

    let currentConfig = { ...DEFAULT_CONFIG };
    let clockCards = [];
    let configPollActive = false;

    function setOnair(isOn){
      document.body.classList.toggle("onair", !!isOn);
    }

    //  Formatters cachés (évite les re-créations coûteuses chaque seconde) 
    const timeFormatters = {};
    const dateFormatters = {};
    const fullFormatters = {};

    function isValidTimeZone(tz){
      if(!tz) return false;
      try{
        new Intl.DateTimeFormat("fr-FR", { timeZone: tz });
        return true;
      }catch{
        return false;
      }
    }

    function escapeHtml(value){
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function cloneSecondaryClocks(clocks = DEFAULT_SECONDARY_CLOCKS){
      return clocks.map((clock) => ({ ...clock }));
    }

    function normalizeClockItem(clock){
      const requestedTimeZone = typeof clock?.timeZone === "string"
        ? clock.timeZone.trim()
        : typeof clock?.timezone === "string"
          ? clock.timezone.trim()
          : typeof clock?.tz === "string"
            ? clock.tz.trim()
            : "";

      if(!isValidTimeZone(requestedTimeZone)) return null;

      const label = typeof clock?.label === "string" && clock.label.trim()
        ? clock.label.trim()
        : typeof clock?.name === "string" && clock.name.trim()
          ? clock.name.trim()
          : typeof clock?.city === "string" && clock.city.trim()
            ? clock.city.trim()
            : requestedTimeZone;

      return { label, timeZone: requestedTimeZone };
    }

    function normalizeSecondaryClocks(clocks){
      if(!Array.isArray(clocks)) return cloneSecondaryClocks();

      const next = clocks
        .map((clock) => normalizeClockItem(clock))
        .filter(Boolean);

      return next.length ? next : cloneSecondaryClocks();
    }

    function normalizeConfig(config){
      const next = { ...DEFAULT_CONFIG };

      if(typeof config?.showTitle === "string" && config.showTitle.trim()){
        next.showTitle = config.showTitle.trim();
      }

      const requestedTimeZone = typeof config?.primaryTimeZone === "string"
        ? config.primaryTimeZone.trim()
        : "";

      if(isValidTimeZone(requestedTimeZone)){
        next.primaryTimeZone = requestedTimeZone;
      }

      if(typeof config?.primaryTimeZoneLabel === "string" && config.primaryTimeZoneLabel.trim()){
        next.primaryTimeZoneLabel = config.primaryTimeZoneLabel.trim();
      }else{
        next.primaryTimeZoneLabel = next.primaryTimeZone;
      }

      next.secondaryClocks = normalizeSecondaryClocks(
        config?.secondaryClocks || config?.clocks
      );

      return next;
    }

    function renderClockCards(){
      clockGridEl.innerHTML = currentConfig.secondaryClocks.map((clock) => `
        <div class="clockCard" data-tz="${escapeHtml(clock.timeZone)}">
          <div class="city">${escapeHtml(clock.label)}</div>
          <div class="time" data-time>--:--:--</div>
          <div class="meta">
            <span>${escapeHtml(clock.timeZone)}</span>
            <span data-date>--/--/----</span>
          </div>
        </div>
      `).join("");

      clockCards = Array.from(clockGridEl.querySelectorAll("[data-tz]"));
    }

    function applyConfig(config){
      currentConfig = normalizeConfig(config);
      showNameEl.textContent = currentConfig.showTitle;
      primaryMetaEl.textContent = `${currentConfig.primaryTimeZoneLabel} (${currentConfig.primaryTimeZone})`;
      document.title = `${currentConfig.showTitle} - Regie ON-AIR`;
      renderClockCards();
      updateClocks();
      requestAnimationFrame(fitToScreen);
    }

    function getFormatter(tz, type){
      if(type === "time"){
        if(!timeFormatters[tz]){
          timeFormatters[tz] = new Intl.DateTimeFormat("fr-FR", {
            timeZone: tz, hour12: false,
            hour:"2-digit", minute:"2-digit", second:"2-digit"
          });
        }
        return timeFormatters[tz];
      }
      if(!dateFormatters[tz]){
        dateFormatters[tz] = new Intl.DateTimeFormat("fr-FR", {
          timeZone: tz, year:"numeric", month:"2-digit", day:"2-digit"
        });
      }
      return dateFormatters[tz];
    }

    function getFullFormatter(tz){
      if(!fullFormatters[tz]){
        fullFormatters[tz] = new Intl.DateTimeFormat("fr-FR", {
          timeZone: tz, weekday:"long", year:"numeric", month:"long",
          day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false
        });
      }
      return fullFormatters[tz];
    }

    function updateClocks(){
      const now = new Date();
      clockCards.forEach(card => {
        const tz = card.getAttribute("data-tz");
        card.querySelector("[data-time]").textContent = getFormatter(tz,"time").format(now);
        card.querySelector("[data-date]").textContent = getFormatter(tz,"date").format(now);
      });
      fullTimeEl.textContent = `Heure complète (${currentConfig.primaryTimeZoneLabel}) : ${getFullFormatter(currentConfig.primaryTimeZone).format(now)}`;
      primaryTimeEl.textContent = getFormatter(currentConfig.primaryTimeZone,"time").format(now);
    }

    // ── Polling 500 ms — fiable, universel, latence imperceptible ────────────
    let pollActive = false;

    async function pollState() {
      if (pollActive) return;
      pollActive = true;
      const ctrl    = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 4000);
      try {
        const res  = await fetch("/api/state", { cache: "no-store", signal: ctrl.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        setOnair(!!data.onair);
        apiLamp.className   = "lamp ok";
        apiText.textContent = "API: OK";
      } catch {
        // On garde l'état affiché — pas de flash vert intempestif
        apiLamp.className   = "lamp bad";
        apiText.textContent = "API: KO";
      } finally {
        clearTimeout(timeout);
        pollActive = false;
        setTimeout(pollState, 500);
      }
    }

    async function refreshConfig() {
      if (configPollActive) return;
      configPollActive = true;
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 4000);

      try {
        const res = await fetch("/api/config", { cache: "no-store", signal: ctrl.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const config = await res.json();
        applyConfig(config);
      } catch {
        applyConfig(currentConfig);
      } finally {
        clearTimeout(timeout);
        configPollActive = false;
        setTimeout(refreshConfig, 5000);
      }
    }

    function fitToScreen(){
      // Scale only by width so content fills the full viewport width
      const scale = window.innerWidth / 1920;
      // Set page height to fill full viewport in page coordinate space
      const pageH = Math.round(window.innerHeight / scale);
      page.style.height = pageH + "px";
      page.style.setProperty("--scale", scale.toFixed(4));
      document.querySelector(".stage").style.height = window.innerHeight + "px";
    }

    applyConfig(DEFAULT_CONFIG);
    updateClocks();
    setInterval(updateClocks, 1000);

    pollState();
    refreshConfig();

    fitToScreen();
    window.addEventListener("resize", fitToScreen);

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") pollState();
    });
  </script>
</body>
</html>
