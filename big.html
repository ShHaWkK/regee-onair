<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ON-AIR</title>
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }

    html, body{
      height:100%;
      width:100%;
      overflow:hidden;
    }

    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #0b1625;
    }

    .wrap{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: box-shadow .4s ease, background .4s ease;
    }

    .wrap.onair{
      background: #0b1625;
      box-shadow:
        inset 0 0 0 16px #ff2d2d,
        inset 0 0 100px rgba(255,45,45,.35),
        inset 0 0 220px rgba(255,45,45,.18);
    }

    .label{
      font-weight: 900;
      letter-spacing: 16px;
      text-transform: uppercase;
      font-size: clamp(80px, 14vw, 220px);
      line-height: 1;
      -webkit-user-select:none;
      user-select: none;
      transition: color .4s ease, text-shadow .4s ease;
      color: #ffffff;
      text-shadow: 0 4px 0 rgba(0,0,0,.10);
    }

    .wrap.onair .label{
      color: #ff2d2d;
      text-shadow:
        0 4px 0 rgba(0,0,0,.30),
        0 0 80px rgba(255,45,45,.70),
        0 0 180px rgba(255,45,45,.35);
      animation: breathe 1.8s ease-in-out infinite;
    }

    @keyframes breathe{
      0%,100%{ filter: brightness(1.00); }
      50%{ filter: brightness(1.12); }
    }

    .apiDot{
      position: fixed;
      bottom: 20px;
      right: 24px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      transition: background .3s ease, box-shadow .3s ease;
    }
    .apiDot.ok{
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,.30), 0 0 14px rgba(34,197,94,.40);
    }
    .apiDot.bad{
      background: #ef4444;
      box-shadow: 0 0 0 2px rgba(239,68,68,.30), 0 0 14px rgba(239,68,68,.40);
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="label">ON-AIR</div>
  </div>
  <span class="apiDot" id="apiDot"></span>

  <script>
    const wrap   = document.getElementById("wrap");
    const apiDot = document.getElementById("apiDot");
    let pollActive = false;

    async function pollState(){
      if(pollActive) return;
      pollActive = true;
      const ctrl    = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 4000);
      try{
        const res  = await fetch("/api/state", { cache:"no-store", signal: ctrl.signal });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        wrap.classList.toggle("onair", !!data.onair);
        apiDot.className = "apiDot ok";
      }catch{
        apiDot.className = "apiDot bad";
      }finally{
        clearTimeout(timeout);
        pollActive = false;
        setTimeout(pollState, 500);
      }
    }

    pollState();
  </script>
</body>
</html>
